name: Job Alert Agent

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  check-jobs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Restore job state cache
        uses: actions/cache@v5
        with:
          path: data/seen_jobs.json
          key: seen-jobs-${{ runner.os }}
          restore-keys: |
            seen-jobs-

      - name: Run job alert scraper
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python scraper.py

      - name: Commit and push jobs.json to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/jobs.json
          git diff --staged --quiet || git commit -m "Update jobs.json [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save job state cache
        uses: actions/cache/save@v5
        if: always()
        with:
          path: data/seen_jobs.json
          key: seen-jobs-${{ runner.os }}-${{ github.run_id }}